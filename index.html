<style>

  .trci.flipped{ transform:rotateY(180deg); }
  .trbk,.trfc{ position:absolute; inset:0; -webkit-backface-visibility:hidden; backface-visibility:hidden; border-radius:11px; overflow:hidden; background:linear-gradient(165deg,#2C2247,#140C24); }
  .trfc{ transform:rotateY(180deg); }

  .trbody{ margin-top:12px; background:rgba(255,255,255,.05); border:1px solid rgba(201,168,106,.28); border-radius:14px; padding:14px; color:#EDE6DA; font-size:13.5px; line-height:1.72; font-family:'NexonLv2','Pretendard',sans-serif; min-height:44px; }

  .trbrand{ text-align:center; margin-top:11px; color:#6E5F8C; font-size:10px; letter-spacing:1px; }
  .composer{ flex:0 0 auto; padding:10px 12px calc(10px + env(safe-area-inset-bottom)); border-top:1px solid var(--line); display:flex; gap:9px; align-items:flex-end; background:#F7F7F7; }
  .composer textarea{ flex:1; resize:none; border:1px solid var(--line); background:#fff; color:#333; border-radius:18px; padding:10px 14px; font-family:inherit; font-size:15px; line-height:1.4; max-height:120px; outline:none; }
  .composer textarea::placeholder{ color:#b3b3b3; }
  .send{ width:40px; height:40px; flex:0 0 auto; border:1px solid var(--line); border-radius:50%; background:#fff; color:var(--send); font-size:16px; cursor:pointer; display:grid; place-items:center; transition:.12s; }

  .send:disabled{ opacity:.4; cursor:not-allowed; }
  .lock{ position:absolute; inset:0; z-index:20; overflow:hidden; background:#3a2a1a url('wallpaper.jpg') center/cover no-repeat; display:flex; flex-direction:column; color:#fff; transition:opacity .45s, transform .45s; }
  .lock.hide{ opacity:0; transform:scale(1.05); pointer-events:none; }
  .lock::before{ content:''; position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,.12), transparent 30%, transparent 70%, rgba(0,0,0,.18)); }
  .sbar{ position:relative; z-index:3; display:flex; align-items:center; justify-content:space-between; padding:14px 22px 0; font-size:14px; font-weight:600; text-shadow:0 1px 3px rgba(0,0,0,.25); }
  .sbar .rgt{ display:flex; align-items:center; gap:6px; }
  .bat{ width:23px; height:11px; border:1.3px solid rgba(255,255,255,.85); border-radius:3px; position:relative; }
  .bat i{ position:absolute; left:1.5px; top:1.5px; bottom:1.5px; width:60%; background:#fff; border-radius:1px; }
  .isl{ position:absolute; top:11px; left:50%; transform:translateX(-50%); width:90px; height:26px; background:#000; border-radius:15px; z-index:4; }
  .lclock{ position:relative; z-index:3; text-align:center; margin-top:30px; text-shadow:0 2px 10px rgba(0,0,0,.2); }
  .ldate{ font-size:16px; font-weight:600; }
  .ltime{ font-size:78px; font-weight:300; line-height:1.05; letter-spacing:-1px; margin-top:2px; }
  .noti{ position:relative; z-index:3; margin:auto 12px 0; width:calc(100% - 24px); background:rgba(250,250,250,.82); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-radius:22px; padding:12px 13px; display:flex; gap:11px; align-items:flex-start; box-shadow:0 6px 22px rgba(0,0,0,.16); cursor:pointer; border:none; text-align:left; animation:notiIn .5s .3s both; }
  @keyframes notiIn{ from{ opacity:0; transform:translateY(-12px);} to{opacity:1; transform:none;} }
  .kicon{ width:40px; height:40px; border-radius:11px; background:var(--kakao); flex:0 0 auto; position:relative; }
  .kbub{ position:absolute; top:10px; left:8px; width:24px; height:17px; background:#3B1E1E; border-radius:9px; }
  .kbub::after{ content:''; position:absolute; bottom:-3px; left:5px; width:6px; height:6px; background:#3B1E1E; transform:rotate(45deg); border-radius:1px; }
  .nbody{ flex:1; min-width:0; }
  .nrow{ display:flex; justify-content:space-between; align-items:baseline; }
  .ntitle{ font-size:15px; font-weight:700; color:#111; }
  .ntime{ font-size:12px; color:#8a8a8e; }
  .nmsg{ font-size:14px; color:#1c1c1e; margin-top:2px; line-height:1.35; }
  .lhint{ position:relative; z-index:3; text-align:center; font-size:11px; color:rgba(255,255,255,.85); margin-top:9px; text-shadow:0 1px 4px rgba(0,0,0,.3); }
  .lbtm{ position:relative; z-index:3; display:flex; justify-content:space-between; padding:0 42px; margin-top:16px; margin-bottom:14px; }
  .rd{ width:44px; height:44px; border-radius:50%; background:rgba(0,0,0,.25); display:grid; place-items:center; font-size:17px; }
  .hbar{ position:relative; z-index:3; width:120px; height:5px; border-radius:3px; background:rgba(255,255,255,.85); margin:0 auto 8px; }
  @media (min-width:700px){
    .stage{ background:#0c0c0f; padding:26px; }
    .device{ width:392px; max-width:none; height:min(848px, calc(100dvh - 52px)); border:13px solid #090909; border-radius:56px; box-shadow:0 30px 80px rgba(0,0,0,.55); }
    .device::before{ content:''; position:absolute; top:12px; left:50%; transform:translateX(-50%); width:112px; height:26px; background:#000; border-radius:16px; z-index:60; }
    .header{ padding-top:20px; } .sbar{ padding-top:16px; }
  }
</style>

<script>
const scrollEl=document.getElementById('scroll'),inputEl=document.getElementById('input'),sendEl=document.getElementById('send'),lockEl=document.getElementById('lock'),history=[],WD=['일','월','화','수','목','금','토'];
function two(n){return n<10?'0'+n:''+n;}
function updateLock(){const d=new Date();let h=d.getHours();const m=d.getMinutes();let h12=h%12;if(h12===0)h12=12;document.getElementById('lockTime').textContent=h12+':'+two(m);document.getElementById('lockDate').textContent=(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+WD[d.getDay()]+')';}
function timeLabel(){const d=new Date();let h=d.getHours();const m=d.getMinutes();const ap=h<12?'오전':'오후';let h12=h%12;if(h12===0)h12=12;return ap+' '+h12+':'+two(m);}
updateLock();setInterval(updateLock,15000);
function scrollDown(){scrollEl.scrollTop=scrollEl.scrollHeight;}
function addMessage(text,who){const row=document.createElement('div');row.className='row '+(who==='me'?'me':'bot');if(who==='bot'){const mini=document.createElement('div');mini.className='mini';row.appendChild(mini);}const b=document.createElement('div');b.className='bubble';b.textContent=text;row.appendChild(b);scrollEl.appendChild(row);scrollDown();return row;}
function showTyping(){const row=document.createElement('div');row.className='row bot typing';row.innerHTML='<div class="mini"></div><div class="bubble"><span></span><span></span><span></span></div>';scrollEl.appendChild(row);scrollDown();return row;}
let entryEl=null;
function showEntry(){
  const dl=document.createElement('div');dl.className='dateline';dl.innerHTML='<span>'+timeLabel()+'</span>';scrollEl.appendChild(dl);
  addMessage('전화했었네? 무슨 일 있어?','bot');
  entryEl=document.createElement('div');
  const hint=document.createElement('div');hint.className='hint-line';hint.textContent='고민 하나 골라서 보내거나, 직접 써도 돼.';
  const chips=document.createElement('div');chips.className='chips';
  ['읽씹 당했어','자꾸 연락하게 돼','이 사람 날 좋아하나?','헤어질까 말까'].forEach(t=>{const c=document.createElement('button');c.className='chip';c.textContent=t;c.onclick=()=>{inputEl.value=t;send();};chips.appendChild(c);});
  entryEl.appendChild(hint);entryEl.appendChild(chips);scrollEl.appendChild(entryEl);scrollDown();
}
const DECK=[
  {kr:'달',en:'THE MOON',roman:'XVIII',sym:`<circle cx="30" cy="27" r="15" fill="#E6C878"/><circle cx="38" cy="22" r="13" fill="#150E26"/>`},
  {kr:'별',en:'THE STAR',roman:'XVII',sym:`<path d="M30,11 L34,25 L48,29 L34,33 L30,47 L26,33 L12,29 L26,25 Z" fill="#E6C878"/>`},

  {kr:'연인',en:'THE LOVERS',roman:'VI',sym:`<circle cx="24" cy="29" r="10" fill="none" stroke="#E6C878" stroke-width="3"/><circle cx="36" cy="29" r="10" fill="none" stroke="#E6C878" stroke-width="3"/>`},
  {kr:'탑',en:'THE TOWER',roman:'XVI',sym:`<rect x="23" y="22" width="14" height="24" fill="none" stroke="#E6C878" stroke-width="2"/><path d="M30,9 L25,22 L35,22 Z" fill="#E6C878"/><path d="M31,25 l-4,8 l5,0 l-4,8" fill="none" stroke="#FFD54F" stroke-width="2"/>`},
  {kr:'운명의 수레바퀴',en:'WHEEL',roman:'X',sym:`<circle cx="30" cy="29" r="15" fill="none" stroke="#E6C878" stroke-width="2.5"/><line x1="30" y1="14" x2="30" y2="44" stroke="#E6C878" stroke-width="2"/><line x1="15" y1="29" x2="45" y2="29" stroke="#E6C878" stroke-width="2"/><line x1="19" y1="18" x2="41" y2="40" stroke="#E6C878" stroke-width="1.5"/><line x1="41" y1="18" x2="19" y2="40" stroke="#E6C878" stroke-width="1.5"/>`},
  {kr:'여황제',en:'THE EMPRESS',roman:'III',sym:`<path d="M15,42 L19,22 L30,32 L41,22 L45,42 Z" fill="#E6C878"/><rect x="15" y="42" width="30" height="5" fill="#E6C878"/>`},
  {kr:'힘',en:'STRENGTH',roman:'VIII',sym:`<path d="M20,29 a6.5,6.5 0 1 1 10,0 a6.5,6.5 0 1 0 10,0 a6.5,6.5 0 1 1 -10,0 a6.5,6.5 0 1 0 -10,0 Z" fill="none" stroke="#E6C878" stroke-width="2.5"/>`}
];
let tarotDrawn=null;
const BACK_SVG='<svg viewBox="0 0 120 180" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" fill="none"><g stroke="#C9A86A"><rect x="6" y="6" width="108" height="168" rx="10" stroke-width="1.1"/><rect x="10.5" y="10.5" width="99" height="159" rx="6.5" stroke-width="0.6" opacity=".6"/><path d="M16 28 Q16 16 28 16" stroke-width="0.7" opacity=".85"/><path d="M104 28 Q104 16 92 16" stroke-width="0.7" opacity=".85"/><path d="M16 152 Q16 164 28 164" stroke-width="0.7" opacity=".85"/><path d="M104 152 Q104 164 92 164" stroke-width="0.7" opacity=".85"/><circle cx="60" cy="26" r="3.2" stroke-width="0.8"/><path d="M60 34 a5 5 0 1 0 0 10 a3.6 3.6 0 1 1 0 -10 z" fill="#C9A86A" stroke="none"/><circle cx="60" cy="154" r="3.2" stroke-width="0.8"/><path d="M60 136 a5 5 0 1 0 0 10 a3.6 3.6 0 1 1 0 -10 z" fill="#C9A86A" stroke="none"/><circle cx="60" cy="90" r="33" stroke-width="1.3" stroke-dasharray="1 5"/><circle cx="60" cy="90" r="27" stroke-width="0.9"/><circle cx="60" cy="90" r="19" stroke-width="0.55" opacity=".65"/><g fill="#C9A86A" stroke="none"><path d="M60 60 L63 63 L60 66 L57 63 Z"/><path d="M60 114 L63 117 L60 120 L57 117 Z"/><path d="M90 87 L93 90 L90 93 L87 90 Z"/><path d="M30 87 L33 90 L30 93 L27 90 Z"/></g><path d="M63 80 A10 10 0 1 0 63 100 A7.5 7.5 0 1 1 63 80 Z" fill="#E6C878" stroke="none"/><g fill="#E6C878" stroke="none"><path d="M39 58 L40 61 L43 62 L40 63 L39 66 L38 63 L35 62 L38 61 Z"/><path d="M81 58 L82 61 L85 62 L82 63 L81 66 L80 63 L77 62 L80 61 Z"/></g></g></svg>';
function frameSVG(color){return '<svg viewBox="0 0 84 124" width="100%" height="100%" style="position:absolute;inset:0" fill="none" stroke="'+color+'"><rect x="4" y="4" width="76" height="116" rx="8" stroke-width="0.9"/><rect x="7.5" y="7.5" width="69" height="109" rx="5" stroke-width="0.5" opacity="0.55"/><circle cx="42" cy="62" r="24" stroke-width="0.9" stroke-dasharray="1 4" opacity="0.85"/></svg>';}
function faceInner(c,hi){return frameSVG(hi?'#E6C878':'#C9A86A')+'<div class="trrn">'+c.roman+'</div><div class="trsym"><svg width="38" height="38" viewBox="0 0 60 60">'+c.sym+'</svg></div><div class="trkr">'+c.kr+'</div><div class="tren">'+c.en+'</div>';}
function showTarotButton(){
  const wrap=document.createElement('div');wrap.className='tbtnwrap';
  const btn=document.createElement('button');btn.className='tbtn';btn.textContent='🔮 타로 보기';
  btn.onclick=()=>{wrap.remove();openTarotPicker();};
  wrap.appendChild(btn);scrollEl.appendChild(wrap);scrollDown();
}
function openTarotPicker(){
  const idx=DECK.map((_,i)=>i);tarotDrawn=[];
  for(let i=0;i<3;i++){const j=Math.floor(Math.random()*idx.length);tarotDrawn.push(DECK[idx[j]]);idx.splice(j,1);}
  const N=11; let fan='';
  for(let i=0;i<N;i++){const t=i-(N-1)/2;const x=Math.round(t*26);const r=(t*4).toFixed(1);const y=Math.round(Math.abs(t)*3);const base='translate(-50%,0) translate('+x+'px,'+y+'px) rotate('+r+'deg)';const lift='translate(-50%,0) translate('+x+'px,'+(y-32)+'px) rotate('+r+'deg)';fan+='<div class="tcd" data-b="'+base+'" data-l="'+lift+'" style="transform:'+base+'">'+BACK_SVG+'</div>';}
  const over=document.createElement('div');over.className='tover';
  over.innerHTML='<div class="tpk"><div class="tpt">마음 가는 <b>카드 3장</b>을 골라봐</div><div class="tps">고민 떠올리면서 천천히</div><div class="tpc"><span id="tpcnt">0</span> / 3</div><div class="tfan">'+fan+'</div><button class="tpbtn" id="tpbtn" disabled>3장 골라줘</button></div>';
  document.querySelector('.device').appendChild(over);
  const selected=[];
  over.querySelectorAll('.tcd').forEach(cd=>{
    cd.onclick=()=>{
      const p=selected.indexOf(cd);
      if(p>-1){selected.splice(p,1);cd.classList.remove('sel');cd.style.transform=cd.getAttribute('data-b');}
      else{if(selected.length>=3)return;selected.push(cd);cd.classList.add('sel');cd.style.transform=cd.getAttribute('data-l');}
      const c=selected.length;over.querySelector('#tpcnt').textContent=c;
      const btn=over.querySelector('#tpbtn');btn.disabled=c<3;btn.textContent=c<3?(3-c)+'장 더 골라':'이 3장으로 볼게';
    };
  });
  over.querySelector('#tpbtn').onclick=()=>{if(selected.length<3)return;over.remove();showTarotResult();};
}
function showTarotResult(){
  const POS=['과거','현재','미래'], PC=['#B89BD6','#E6C878','#B89BD6'];
  const d=new Date(), dstr=d.getFullYear()+'.'+two(d.getMonth()+1)+'.'+two(d.getDate());
  let cards='';
  tarotDrawn.forEach((c,i)=>{cards+='<div class="trcol"><div class="trpos" style="color:'+PC[i]+'">'+POS[i]+'</div><div class="trcw"><div class="trci" id="trc'+i+'"><div class="trbk">'+BACK_SVG+'</div><div class="trfc">'+faceInner(c,i===1)+'</div></div></div></div>';});
  const over=document.createElement('div');over.className='tres';
  over.innerHTML='<div class="tresc"><div class="trtop"><div class="trttl">🔮 언니의 타로</div><div class="trdate">'+dstr+'</div></div><div class="trrow">'+cards+'</div><div class="trhead" id="trhead"></div><div class="trbody" id="trbody"><div class="trdots"><span></span><span></span><span></span></div></div><button class="trclose" id="trclose">닫기</button><div class="trbrand">언니한테 톡</div></div>';
  document.querySelector('.device').appendChild(over);
  const t0=performance.now(), REVEAL=400+3*550+300;
  tarotDrawn.forEach((c,i)=>setTimeout(()=>{const el=document.getElementById('trc'+i);if(el)el.classList.add('flipped');},400+i*550));
  const closeBtn=over.querySelector('#trclose');
  closeBtn.onclick=()=>{
    over.remove();
    const b=over.__body;
    if(b){addMessage((over.__head?'「'+over.__head+'」\n':'')+b,'bot');}
  };
  const names=tarotDrawn.map((c,i)=>POS[i]+' '+c.kr+'('+c.en+')').join(', ');
  history.push({role:'user',content:'방금 타로 카드 3장 뽑았어. '+names+' 나왔어. 이 카드들로 지금 내 상황 봐줘.'});
  askClaude().then(reply=>{
    const clean=reply.replace(/\[\[타로\]\]/g,'').trim();
    history.push({role:'assistant',content:clean});
    let head='',body=clean;
    const k=clean.indexOf('||');
    if(k!==-1){head=clean.slice(0,k).trim().replace(/^["“”'\s]+|["“”'\s]+$/g,'');body=clean.slice(k+2).trim();}
    over.__head=head;over.__body=body;
    const wait=Math.max(0,REVEAL-(performance.now()-t0));
    setTimeout(()=>{
      const hEl=over.querySelector('#trhead'),bEl=over.querySelector('#trbody');
      if(head){hEl.textContent='“'+head+'”';hEl.classList.add('on');}
      bEl.textContent=body;
      closeBtn.classList.add('on');
    },wait);
  }).catch(err=>{
    console.error(err);
    over.__body='어 잠깐, 카드 해석이 지금 안 되네. 좀 있다 다시.';
    const wait=Math.max(0,REVEAL-(performance.now()-t0));
    setTimeout(()=>{over.querySelector('#trbody').textContent=over.__body;closeBtn.classList.add('on');},wait);
  });
}
async function askClaude(){const res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:history})});if(!res.ok)throw new Error("status "+res.status);const data=await res.json();return data.content.map(c=>c.type==="text"?c.text:"").join("").trim();}
let busy=false;
async function send(){
  const text=inputEl.value.trim();if(!text||busy)return;
  if(entryEl){entryEl.remove();entryEl=null;}
  busy=true;sendEl.disabled=true;
  addMessage(text,'me');history.push({role:"user",content:text});
  inputEl.value='';autoGrow();
  const typing=showTyping();
  try{
    const reply=await askClaude();typing.remove();
    let clean=reply,offer=false;
    if(clean.indexOf('[[타로]]')!==-1){offer=true;clean=clean.replace(/\[\[타로\]\]/g,'').trim();}
    addMessage(clean,'bot');history.push({role:"assistant",content:clean});
    if(offer)showTarotButton();
  }catch(err){typing.remove();addMessage("어 잠깐만.. 나 지금 연결이 안 되네. 좀 있다 다시 말 걸어봐.",'bot');console.error(err);}
  finally{busy=false;sendEl.disabled=inputEl.value.trim()==='';}
}
function autoGrow(){inputEl.style.height='auto';inputEl.style.height=Math.min(inputEl.scrollHeight,120)+'px';sendEl.disabled=inputEl.value.trim()===''||busy;}
inputEl.addEventListener('input',autoGrow);
inputEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
sendEl.addEventListener('click',send);
document.getElementById('notiBtn').addEventListener('click',()=>{lockEl.classList.add('hide');setTimeout(()=>{showEntry();inputEl.focus();},300);});
</script>
